# Dev config for tddy-daemon (default for ./web-dev when DAEMON_CONFIG is unset).
# Maps stub user "testuser" to current OS user for local dev.
# For Tddy Desktop (Electrobun), see dev.desktop.yaml at the repo root (default when TDDY_DAEMON_CONFIG is unset).

log:
  loggers:
    default:
      output: { file: "tmp/logs/daemon" }
      format: "{timestamp} [{level}] [{target}] {message}"
    webrtc:
      output: { file: "tmp/logs/webrtc" }
      format: "{timestamp} [{level}] [{target}] {message}"
    livekit_peer_metadata:
      output: { file: "tmp/logs/daemon-livekit-peer-metadata" }
      format: "{timestamp} [{level}] [{target}] {message}"
  default:
    level: debug
    logger: default
  policies:
    - selector: { target: libwebrtc* }
      logger: webrtc
    - selector: { target: livekit* }
      logger: webrtc
    - selector: { target: livekit_api* }
      logger: webrtc
    - selector: { target: tddy_daemon::livekit_peer_discovery::peer_metadata }
      logger: livekit_peer_metadata

listen:
  web_port: 8899
  web_host: 127.0.0.1

# Unique LiveKit identity per process in `livekit.common_room` (defaults to hostname, e.g. udoo).
# Fixed to "dev" for local dev — avoids needing to look up udoo-XXXXX after each restart.
# Set daemon_instance_id_append_startup_timestamp: true if running multiple daemons simultaneously.
daemon_instance_id: dev
daemon_instance_id_append_startup_timestamp: false

# Production web bundle (used when hitting the daemon port directly). For live dev + HMR use
# ./web-dev and open the Vite port (default 5173), not this port — see docs/ft/web/local-web-dev.md.
web_bundle_path: packages/tddy-web/dist

# Browser DEBUG mask exposed at GET /api/config. A `debug`-package namespace mask that turns on scoped
# `[tddy]` diagnostics in the browser console — handy for chasing terminal garbling / misalignment.
# Namespaces: tddy:term:write (bytes in), tddy:term:data (keys out), tddy:term:resize (cols/rows),
# tddy:term:grpc (gRPC byte stream), tddy:term:life, tddy:term:mouse. Use `tddy:term:*` for all.
# Override per-browser in DevTools: `localStorage.debug = 'tddy:term:write'`; the browser invalidates
# that override only when this value changes. Comment out (or set "") to disable. `?debug=` URL param wins.
debug: "tddy:term:*"

livekit:
  url: ws://127.0.0.1:7880
  api_key: devkey
  api_secret: secret
  public_url: ws://127.0.0.1:7880
  common_room: tddy-lobby

github:
  stub: true
  stub_codes: "test-code:testuser"

users:
  - github_user: "testuser"
    os_user: "CURRENT_USER"  # Replaced by web-dev with $USER

# When true (default), pass --mouse to spawned tddy-* (browser / touch terminals).
spawn_mouse: true

# When true (default), this daemon binds Codex OAuth loopback TCP (e.g. 127.0.0.1:1455) and tunnels
# via LiveKit. Set false if another process already owns that port. Override: TDDY_CODEX_OAUTH_LOOPBACK_PROXY_ELIGIBLE.
# codex_oauth_loopback_proxy_eligible: true

# Inbound session control (/sessions, /delete, /start-workflow) uses teloxide long-polling when
# enabled: true, bot_token is valid, and chat_ids match your Telegram chat. Sessions are read from
# ~/.tddy/sessions/ for USER (see web-dev substitution for users.os_user).
telegram:
  enabled: false
  bot_token: "<token>"
  chat_ids:
    - -5239346661

# Backends shown in tddy-web (ConnectionScreen); ids are passed to StartSession / `tddy-coder --agent`.
# For `codex-acp`: after `./dev bun install`, the nix dev shell prepends `node_modules/.bin` (Node shim).
# Production: `sudo ./install --systemd` copies the native binary to INSTALL_BIN_DIR/codex-acp; spawned
# users need that dir on PATH or `spawn_path_extra` in `~/.tddy/config.yaml`.
# Overrides: `TDDY_CODEX_ACP_CLI`, `--codex-acp-cli-path`, or YAML from `-c` / `sessions/<id>/coder-config.yaml`.
# Enables the "Claude Code CLI" session type in ConnectionScreen (spawns `claude` CLI in a PTY).
# binary_path defaults to "claude" (resolved from PATH).
claude_cli:
  binary_path: claude

allowed_agents:
  - id: claude
    label: "Claude (opus)"
  - id: claude-acp
    label: "Claude ACP (opus)"
  - id: cursor
    label: "Cursor (composer-2)"
  - id: stub
    label: "Stub"
  - id: codex
    label: "Codex"
  - id: codex-acp
    label: "Codex ACP"
  - id: fastcontext
    label: "FastContext (microsoft/FastContext-1.0-4B-RL)"

allowed_tools:
  - path: "target/debug/tddy-coder"
    label: "tddy-coder (debug)"
  - path: "target/release/tddy-coder"
    label: "tddy-coder (release)"
  - path: "target/debug/tddy-tools"
    label: "tddy-tools (debug)"
  - path: "target/release/tddy-tools"
    label: "tddy-tools (release)"
  - path: "target/debug/tddy-demo"
    label: "tddy-demo (debug)"
  - path: "target/release/tddy-demo"
    label: "tddy-demo (release)"
