# Required for libwebrtc on macOS: ObjC categories must be loaded.
# Without this, Room::connect crashes with NSInvalidArgumentException in
# RTCVideoEncoderVP9/PeerConnectionFactory (livekit/rust-sdks#340).
#
# This file holds ONLY project-wide, portable settings. Machine-specific config
# (a custom pre-extracted libwebrtc dir via LK_CUSTOM_WEBRTC, a local crates.io
# caching proxy, etc.) belongs in your per-machine ~/.cargo/config.toml, which
# Cargo merges automatically and which is never committed. See
# docs/dev/guides/tech-stack.md (or the README) for an example.
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-ObjC"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-ObjC"]
