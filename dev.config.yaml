daemon: true
mouse: true

livekit:
  url: ws://127.0.0.1:7880
  api_key: devkey
  api_secret: secret
  room: terminal-e2e
  identity: server

web:
  port: 8899
  host: 127.0.0.1
  bundle_path: packages/tddy-web/dist

github:
  stub: true
  stub_codes: "test-code:testuser"

# Codex CLI / Codex ACP — paths are relative to the process cwd. Use with
# `tddy-coder -c dev.config.yaml` from this repo root (not daemon-spawned project cwd).
# After `./dev bun install`, the shim resolves the platform native package.
# codex_cli_path: path/to/codex
codex_acp_cli_path: node_modules/.bin/codex-acp

# Log routing for spawned tddy-coder children. The daemon passes this block verbatim as the
# child's --config when `coder_config_path` points here (see dev.daemon.yaml). Two file loggers:
# `default` carries tddy_* diagnostics; `webrtc` collects the voluminous libwebrtc STUN/ICE and
# livekit chatter. The policies route those targets to the `webrtc` file at INFO, so their DEBUG
# spam is dropped instead of drowning tmp/logs/coder. Paths are relative to the child cwd (the
# session repo root), matching the daemon-synthesized default.
log:
  loggers:
    default:
      output: { file: "tmp/logs/coder" }
      format: "{timestamp} [{level}] [{target}] {message}"
    webrtc:
      output: { file: "tmp/logs/coder-webrtc" }
      format: "{timestamp} [{level}] [{target}] {message}"
  default:
    level: debug
    logger: default
  policies:
    - selector: { target: "libwebrtc*" }
      level: info
      logger: webrtc
    - selector: { target: "livekit*" }
      level: info
      logger: webrtc
  rotation:
    max_rotated: 0
