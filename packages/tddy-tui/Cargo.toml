[package]
name = "tddy-tui"
version = "0.1.0"
edition = "2021"
description = "Ratatui View layer for tddy-coder (MVP architecture)"

[lib]
name = "tddy_tui"
path = "src/lib.rs"

[dependencies]
tddy-core = { path = "../tddy-core" }
ratatui = { version = "0.30", features = ["unstable-rendered-line-info"] }
crossterm = "0.29"
tui-markdown = "0.3"
log = "0.4"
anyhow = "1"
tokio = { version = "1", features = ["sync"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "sync"] }
