[package]
name = "tddy-core"
version = "0.1.0"
edition = "2021"
description = "Core library for tddy-coder"

[dependencies]
agent-client-protocol = { version = "=0.10.4", features = ["unstable"] }
async-trait = "0.1"
futures = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
dashmap = "6"
glob = "0.3"
log = { version = "0.4", features = ["serde"] }
once_cell = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
jsonschema = { version = "0.44", default-features = false }
regex = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs", "process", "sync", "net", "io-util", "time"] }
tokio-util = { version = "0.7", features = ["compat"] }
uuid = { version = "1", features = ["v4", "v7"] }
tddy-workflow = { path = "../tddy-workflow" }
tddy-graph = { path = "../tddy-graph" }
tddy-actions = { path = "../tddy-actions" }
tddy-task = { path = "../tddy-task" }
# Toolcall relay transport (see docs/dev/1-WIP/finish-stdio-ipc-migration.md, Item C):
# `toolcall/listener.rs` serves `ToolcallRpcService` over `tddy-stdio` instead of a bespoke
# newline-delimited-JSON protocol.
tddy-rpc = { path = "../tddy-rpc" }
tddy-stdio = { path = "../tddy-stdio" }

[dev-dependencies]
async-trait = "0.1"
pretty_assertions = { workspace = true }
rstest = { workspace = true }
serial_test = "3"
tempfile = "3"
tddy-testing-commons = { path = "../tddy-testing-commons" }
tddy-graph = { path = "../tddy-graph" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

