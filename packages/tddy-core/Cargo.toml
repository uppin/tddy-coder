[package]
name = "tddy-core"
version = "0.1.0"
edition = "2021"
description = "Core library for tddy-coder"

[dependencies]
async-trait = "0.1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
dashmap = "6"
log = { version = "0.4", features = ["serde"] }
once_cell = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs", "process", "sync", "net", "io-util"] }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
async-trait = "0.1"
serial_test = "3"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

