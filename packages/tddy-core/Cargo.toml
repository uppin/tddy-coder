[package]
name = "tddy-core"
version = "0.1.0"
edition = "2021"
description = "Core library for tddy-coder"

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock"] }
include_dir = "0.7"
jsonschema = { version = "0.44", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

