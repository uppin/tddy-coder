[package]
name = "tddy-core"
version = "0.1.0"
edition = "2021"
description = "Core library for tddy-coder"

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }

