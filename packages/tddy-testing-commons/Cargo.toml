[package]
name = "tddy-testing-commons"
version = "0.1.0"
edition = "2021"
description = "Shared test builders, fakes, and assertion helpers for the tddy workspace"

[dependencies]
tddy-core = { path = "../tddy-core" }
tddy-sandbox = { path = "../tddy-sandbox" }
tddy-sandbox-darwin = { path = "../tddy-sandbox-darwin" }
tddy-sandbox-runner = { path = "../tddy-sandbox-runner" }
tddy-service = { path = "../tddy-service" }
tddy-tools = { path = "../tddy-tools" }
async-trait = "0.1"
bytes = "1"
tempfile = "3"
uuid = { version = "1", features = ["v4"] }
pretty_assertions = { workspace = true }
futures-util = "0.3"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time", "sync"] }
tokio-stream = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
