[package]
name = "tddy-graph"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
dashmap = "6"
indexmap = "2"
log = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs", "sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
uuid = { version = "1", features = ["v4"] }
