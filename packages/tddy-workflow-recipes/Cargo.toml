[package]
name = "tddy-workflow-recipes"
version = "0.1.0"
edition = "2021"
description = "Pluggable workflow recipes (TDD, bug-fix, …) for tddy-coder"

[build-dependencies]
serde_json = "1"

[dependencies]
tddy-core = { path = "../tddy-core" }
tddy-workflow = { path = "../tddy-workflow" }
log = "0.4"
async-trait = "0.1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs", "process", "sync"] }
uuid = { version = "1", features = ["v7"] }

[dev-dependencies]
serial_test = "3"
tempfile = "3"
