[package]
name = "tddy-screenshare"
version = "0.1.0"
edition = "2021"
description = "Protocol-agnostic screen-sharing bridge: ScreenSharingClient trait, LiveKit streamer, and generic bridge loop"

[lib]
name = "tddy_screenshare"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
futures-util = "0.3"
log = "0.4"
prost = "0.13"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "sync", "time", "signal"] }
tokio-stream = "0.1"
livekit = "0.7"
livekit-api = "0.5"
tddy-livekit = { path = "../tddy-livekit" }
tddy-rpc = { path = "../tddy-rpc" }
tddy-service = { path = "../tddy-service" }

[dev-dependencies]
rstest = { workspace = true }
pretty_assertions = { workspace = true }
