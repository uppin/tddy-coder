[package]
name = "tddy-rpc"
version = "0.1.0"
edition = "2021"
description = "Generic RPC framework (types + dispatch) — transport-agnostic"

[lib]
name = "tddy_rpc"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
futures-core = "0.3"
log = "0.4"
prost = "0.13"
tokio = { version = "1", features = ["sync"] }
tonic = { version = "0.11", optional = true }

[build-dependencies]
prost-build = "0.13"

[features]
default = []
tonic = ["dep:tonic"]

[dev-dependencies]
rstest = { workspace = true }
pretty_assertions = { workspace = true }
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync", "time"] }
