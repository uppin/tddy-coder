[package]
name = "tddy-rpc"
version = "0.1.0"
edition = "2021"
description = "Generic RPC framework (types + dispatch) — transport-agnostic"

[lib]
name = "tddy_rpc"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
futures-core = "0.3"
tokio = { version = "1", features = ["sync"] }
tonic = { version = "0.11", optional = true }

[features]
default = []
tonic = ["dep:tonic"]
