[package]
name = "tddy-task"
version = "0.1.0"
edition = "2021"
description = "Long-running background Task abstraction — model, registry, cancellation, I/O channels"

[lib]
name = "tddy_task"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
bytes = "1"
log = "0.4"
thiserror = "1"
tokio = { version = "1", features = ["rt", "sync", "time", "process", "macros"] }
tokio-util = { version = "0.7", features = ["rt"] }
uuid = { version = "1", features = ["v7"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
serial_test = "3"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time", "process"] }
