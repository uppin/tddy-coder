[package]
name = "tddy-daemon"
version = "0.1.0"
edition = "2021"
description = "Multi-user daemon for tddy-* tools — GitHub auth, user mapping, session orchestration"

[lib]
name = "tddy_daemon"
path = "src/lib.rs"

[features]
# Off by default so ordinary dev builds/tests stay candle-free. With it, `production_embedder`
# yields the local bundled model and a `semantic_index = true` request can actually index; without
# it, such a request aborts the start with a clear error (the intended honest behavior).
local-model = ["tddy-semantic-index/local-model"]

[[bin]]
name = "tddy-daemon"
path = "src/main.rs"

[dependencies]
anyhow = "1"
tempfile = "3"
base64 = "0.22"
glob = "0.3"
futures-util = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
async-trait = "0.1"
axum = "0.8"
clap = { version = "4", features = ["derive", "env"] }
hmac = "0.12"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
subtle = "2.6"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs", "sync", "net", "time", "signal", "process", "io-util"] }
bytes = "1"
tonic = { version = "0.12", default-features = false, features = ["transport"] }
livekit = "0.7"
prost = "0.13"
tddy-coder = { path = "../tddy-coder" }
tddy-core = { path = "../tddy-core" }
tddy-discovery = { path = "../tddy-discovery" }
tddy-demo-runner = { path = "../tddy-demo-runner" }
tddy-github = { path = "../tddy-github" }
tddy-workflow-recipes = { path = "../tddy-workflow-recipes" }
tddy-livekit = { path = "../tddy-livekit" }
tddy-lsp = { path = "../tddy-lsp" }
tddy-lsp-executor = { path = "../tddy-lsp-executor" }
tddy-rpc = { path = "../tddy-rpc" }
tddy-stdio = { path = "../tddy-stdio" }
tddy-service = { path = "../tddy-service" }
tddy-actions = { path = "../tddy-actions" }
tddy-task = { path = "../tddy-task" }
tddy-pty = { path = "../tddy-pty" }
tddy-tool-engine = { path = "../tddy-tool-engine" }
tddy-semantic-index = { path = "../tddy-semantic-index" }
tokio-stream = "0.1"
tokio-util = "0.7"
tddy-vm = { path = "../tddy-vm" }
argon2 = "0.5"
chacha20poly1305 = "0.10"
rand = "0.8"
tddy-connectrpc = { path = "../tddy-connectrpc" }
tddy-sandbox = { path = "../tddy-sandbox" }
tddy-sandbox-recipes = { path = "../tddy-sandbox-recipes" }
tddy-sandbox-runner = { path = "../tddy-sandbox-runner" }
tddy-sandbox-qemu = { path = "../tddy-sandbox-qemu" }
sysinfo = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
url = { version = "2", features = ["serde"] }
uuid = { version = "1", features = ["v4", "v7"] }
teloxide = { version = "0.17.0", features = ["macros", "rustls"], default-features = false }

portable-pty = "0.9"

[target.'cfg(target_os = "macos")'.dependencies]
tddy-sandbox-darwin = { path = "../tddy-sandbox-darwin" }

[target.'cfg(target_os = "linux")'.dependencies]
tddy-sandbox-cgroups = { path = "../tddy-sandbox-cgroups" }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
hyper-util = { version = "0.1", features = ["tokio"] }
http = "1"
tower = "0.5"
tokio-stream = "0.1"

[dev-dependencies]
assert_cmd = "2"
tddy-tools = { path = "../tddy-tools" }
tddy-sandbox-darwin = { path = "../tddy-sandbox-darwin" }
tddy-testing-commons = { path = "../tddy-testing-commons" }
tddy-github = { path = "../tddy-github" }
tddy-livekit-testkit = { path = "../tddy-livekit-testkit" }
livekit = "0.7"
serial_test = "3"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json"] }
scopeguard = "1"
