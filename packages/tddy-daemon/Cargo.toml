[package]
name = "tddy-daemon"
version = "0.1.0"
edition = "2021"
description = "Multi-user daemon for tddy-* tools — GitHub auth, user mapping, session orchestration"

[lib]
name = "tddy_daemon"
path = "src/lib.rs"

[[bin]]
name = "tddy-daemon"
path = "src/main.rs"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
async-trait = "0.1"
axum = "0.8"
clap = { version = "4", features = ["derive", "env"] }
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs", "sync", "net", "time", "signal"] }
tonic = { version = "0.12", default-features = false, features = ["transport"] }
tddy-coder = { path = "../tddy-coder" }
tddy-core = { path = "../tddy-core" }
tddy-github = { path = "../tddy-github" }
tddy-livekit = { path = "../tddy-livekit" }
tddy-rpc = { path = "../tddy-rpc" }
tddy-service = { path = "../tddy-service" }
tddy-connectrpc = { path = "../tddy-connectrpc" }
url = { version = "2", features = ["serde"] }
uuid = { version = "1", features = ["v4", "v7"] }
teloxide = { version = "0.17.0", features = ["macros", "rustls"], default-features = false }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json"] }
scopeguard = "1"
