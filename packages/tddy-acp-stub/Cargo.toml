[package]
name = "tddy-acp-stub"
version = "0.1.0"
edition = "2021"
description = "ACP agent stub for testing ClaudeAcpBackend without real Claude"

[[bin]]
name = "tddy-acp-stub"
path = "src/main.rs"

[dependencies]
agent-client-protocol = "0.10.2"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "io-util", "io-std", "sync"] }
tokio-util = { version = "0.7", features = ["compat"] }
