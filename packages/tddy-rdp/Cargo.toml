[package]
name = "tddy-rdp"
version = "0.1.0"
edition = "2021"
description = "RDP-to-LiveKit bridge: implements ScreenSharingClient via IronRDP"

[[bin]]
name = "tddy-rdp"
path = "src/main.rs"

[lib]
name = "tddy_rdp"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
env_logger = "0.11"
log = "0.4"
serde_json = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "net", "sync", "time", "io-util"] }

# Shared screen-sharing bridge infrastructure
tddy-screenshare = { path = "../tddy-screenshare" }

# FIXME: Add IronRDP dependencies when implementing the full RDP protocol.
# Suggested crates (verify versions on crates.io before adding):
#   ironrdp-connector = "0.4"
#   ironrdp-session   = "0.4"
#   ironrdp-tokio     = "0.4"
#   ironrdp-graphics  = "0.4"
