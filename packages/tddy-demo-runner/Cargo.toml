[package]
name = "tddy-demo-runner"
version = "0.1.0"
edition = "2021"
description = "Demo goal runtime: QEMU VM lifecycle, SSH deploy, port-forward, orchestration"

[dependencies]
tddy-workflow-recipes = { path = "../tddy-workflow-recipes" }
tddy-vm = { path = "../tddy-vm" }
async-trait = "0.1"
thiserror = "1"
log = "0.4"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros", "rt-multi-thread"] }
