[package]
name = "tddy-vm"
version = "0.1.0"
edition = "2021"
description = "General-purpose VM build and lifecycle management (QEMU)"

[dependencies]
async-trait = "0.1"
bytes = "1"
libc = "0.2"
tokio-util = { version = "0.7", features = ["rt"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yml = "0.0.12"
sha2 = "0.10"
thiserror = "1"
log = "0.4"
tokio = { version = "1", features = ["rt", "process", "io-util", "net", "sync", "time"] }
tokio-stream = "0.1"
tempfile = "3"
tddy-build = { path = "../tddy-build" }
tddy-build-qemu = { path = "../tddy-build-qemu" }
tddy-service = { path = "../tddy-service" }
tddy-rpc = { path = "../tddy-rpc" }
tddy-task = { path = "../tddy-task" }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "rt-multi-thread"] }
serial_test = "3"
pretty_assertions = { workspace = true }
