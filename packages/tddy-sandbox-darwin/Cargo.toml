[package]
name = "tddy-sandbox-darwin"
version = "0.1.0"
edition = "2021"
description = "macOS Seatbelt sandbox implementation for tddy-sandbox"

[lib]
name = "tddy_sandbox_darwin"
path = "src/lib.rs"

[dependencies]
tddy-sandbox = { path = "../tddy-sandbox" }
tddy-sandbox-runner = { path = "../tddy-sandbox-runner" }
tddy-service = { path = "../tddy-service" }
log = "0.4"
env_logger = "0.11"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
portable-pty = "0.9"
bytes = "1"
tonic = { version = "0.12", default-features = false, features = ["transport"] }
tokio-stream = "0.1"
prost = "0.13"
libc = "0.2"

[dev-dependencies]
tempfile = "3"
serial_test = "3"
futures-util = "0.3"
tddy-sandbox-recipes = { path = "../tddy-sandbox-recipes" }
tddy-testing-commons = { path = "../tddy-testing-commons" }
tddy-tools = { path = "../tddy-tools" }
