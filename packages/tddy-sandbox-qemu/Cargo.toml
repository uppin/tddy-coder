[package]
name = "tddy-sandbox-qemu"
version = "0.1.0"
edition = "2021"
description = "QEMU-VM sandbox backend for tddy-sandbox: boots a qcow2 image and confines a command inside the guest, with host directories mounted via virtio-9p"

[lib]
name = "tddy_sandbox_qemu"
path = "src/lib.rs"

[[bin]]
name = "tddy-sandbox-qemu"
path = "src/main.rs"

[dependencies]
tddy-sandbox = { path = "../tddy-sandbox" }
tddy-sandbox-runner = { path = "../tddy-sandbox-runner" }
anyhow = "1"
log = "0.4"
env_logger = "0.11"
clap = { version = "4", features = ["derive", "env"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "process", "fs", "net", "time"] }
tempfile = "3"
serde_json = "1"
bytes = "1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
rstest = { workspace = true }
pretty_assertions = { workspace = true }
