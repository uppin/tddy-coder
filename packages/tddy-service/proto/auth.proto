syntax = "proto3";

package auth;

service AuthService {
  rpc GetAuthUrl(GetAuthUrlRequest) returns (GetAuthUrlResponse);
  rpc ExchangeCode(ExchangeCodeRequest) returns (ExchangeCodeResponse);
  rpc GetAuthStatus(GetAuthStatusRequest) returns (GetAuthStatusResponse);
  // Re-mint a fresh session token from a currently-valid one. The web client calls this on a
  // timer (well before expiry) to keep an active session alive; an expired token is rejected.
  rpc RefreshSession(RefreshSessionRequest) returns (RefreshSessionResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

message GetAuthUrlRequest {}
message GetAuthUrlResponse {
  string authorize_url = 1;
  string state = 2;
}

message ExchangeCodeRequest {
  string code = 1;
  string state = 2;
}
message ExchangeCodeResponse {
  string session_token = 1;
  GitHubUser user = 2;
}

message GetAuthStatusRequest {
  string session_token = 1;
}
message GetAuthStatusResponse {
  bool authenticated = 1;
  GitHubUser user = 2;
}

message RefreshSessionRequest {
  string session_token = 1;
}
message RefreshSessionResponse {
  string session_token = 1;
  GitHubUser user = 2;
}

message LogoutRequest {
  string session_token = 1;
}
message LogoutResponse {}

message GitHubUser {
  string login = 1;
  string avatar_url = 2;
  string name = 3;
  uint64 id = 4;
}
