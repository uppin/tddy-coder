syntax = "proto3";

package connection;

service ConnectionService {
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  // Models selectable for a given agent (or the "claude-cli" pseudo-agent). Enumerated from the
  // underlying agent command where possible (cursor --list-models, ACP available_models), else a
  // curated tddy-core list. Probes the agent subprocess, so it is called on demand per selected
  // agent — not folded into the cheap ListAgents. See docs/ft/web/tool-session-model-selection.md.
  rpc ListAgentModels(ListAgentModelsRequest) returns (ListAgentModelsResponse);
  // Specialized subagents (YAML-defined; see docs/ft/coder/specialized-subagents.md) available to
  // wire into a managed-codebase session — builtin defs plus <tddyhome>/agents/*.yaml.
  rpc ListSubagents(ListSubagentsRequest) returns (ListSubagentsResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  // Make an existing project available on another host (daemon instance), reusing its project_id.
  // Routed to the target daemon (local or forwarded over the LiveKit common room) which clones the
  // repo and registers a projects.yaml row with the same project_id. See
  // docs/ft/web/projects-screen-multi-host.md.
  rpc AddProjectToHost(AddProjectToHostRequest) returns (AddProjectToHostResponse);
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc ConnectSession(ConnectSessionRequest) returns (ConnectSessionResponse);
  rpc ResumeSession(ResumeSessionRequest) returns (ResumeSessionResponse);
  rpc SignalSession(SignalSessionRequest) returns (SignalSessionResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc ListEligibleDaemons(ListEligibleDaemonsRequest) returns (ListEligibleDaemonsResponse);
  rpc ListSessionWorkflowFiles(ListSessionWorkflowFilesRequest) returns (ListSessionWorkflowFilesResponse);
  rpc ReadSessionWorkflowFile(ReadSessionWorkflowFileRequest) returns (ReadSessionWorkflowFileResponse);
  rpc ListWorktreesForProject(ListWorktreesForProjectRequest) returns (ListWorktreesForProjectResponse);
  rpc RemoveWorktree(RemoveWorktreeRequest) returns (RemoveWorktreeResponse);
  rpc StreamSessionTerminalIO(stream SessionTerminalInput) returns (stream SessionTerminalOutput);
  // Browser-compatible alternative: server-streaming output + separate unary input.
  // (connect-web fetch transport cannot send streaming request bodies required for bidi streaming.)
  rpc StreamTerminalOutput(StreamTerminalOutputRequest) returns (stream SessionTerminalOutput);
  rpc SendTerminalInput(SessionTerminalInput) returns (SendTerminalInputResponse);
  // Multiple terminals per session — start/stop/list login-shell terminals attached to a session.
  // Every terminal is identified; the main `claude` terminal is the reserved id "main".
  rpc StartTerminalSession(StartTerminalSessionRequest) returns (StartTerminalSessionResponse);
  rpc StopTerminalSession(StopTerminalSessionRequest) returns (StopTerminalSessionResponse);
  rpc ListTerminalSessions(ListTerminalSessionsRequest) returns (ListTerminalSessionsResponse);
  rpc ListProjectBranches(ListProjectBranchesRequest) returns (ListProjectBranchesResponse);
  // Remote-codebase mode: execute a tool in a session worktree, or list available tools.
  rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse);
  rpc ListExecTools(ListExecToolsRequest) returns (ListExecToolsResponse);
  rpc ListSessionToolCalls(ListSessionToolCallsRequest) returns (ListSessionToolCallsResponse);
  // Per-worktree hooks (claude-cli sessions only) report granular activity status.
  // Auth: `hook_token` is a per-session random token written to .session.yaml at session start.
  rpc ReportSessionStatus(ReportSessionStatusRequest) returns (ReportSessionStatusResponse);
  // Demo VM lifecycle — UI-driven QEMU boot/shutdown for the demo goal.
  rpc StartDemoVm(StartDemoVmRequest) returns (StartDemoVmResponse);
  rpc StopDemoVm(StopDemoVmRequest) returns (StopDemoVmResponse);
  rpc GetDemoVmStatus(GetDemoVmStatusRequest) returns (GetDemoVmStatusResponse);
  // Single-screen terminal control mutex — at most one screen controls a session's terminals at a
  // time. ClaimTerminalControl issues or steals the exclusive control token; WatchTerminalControl
  // streams ownership changes so a displaced screen can render the "Claim terminal" CTA.
  rpc ClaimTerminalControl(ClaimTerminalControlRequest) returns (ClaimTerminalControlResponse);
  rpc WatchTerminalControl(WatchTerminalControlRequest) returns (stream TerminalControlEvent);
  // PR-Stack Chat Screen: manually append a planned PR to an orchestrator session's stack,
  // choosing its ancestors (parent node ids) from the already-planned nodes. See
  // docs/ft/coder/pr-stacking.md § Manually adding a planned PR.
  rpc AddPlannedPr(AddPlannedPrRequest) returns (AddPlannedPrResponse);
  // Local peer-trust: mint a session token for the caller identified by its SO_PEERCRED peer uid
  // over the daemon's Unix-domain socket. Available only on the local UDS transport (the peer
  // credential is not present on ConnectRPC-HTTP or LiveKit), and only for a peer uid mapped to a
  // configured user.
  rpc MintLocalToken(MintLocalTokenRequest) returns (MintLocalTokenResponse);
  // Host Stats Footer (see docs/ft/web/host-stats-footer.md) — host-level telemetry for the
  // selected daemon. Both are addressed to the daemon directly over the common-room LiveKit
  // connection (no daemon_instance_id payload needed) and validate `session_token`.
  // Per-logical-core CPU utilization percentages; polled by the web every 5 s.
  rpc GetHostCpuStats(GetHostCpuStatsRequest) returns (GetHostCpuStatsResponse);
  // Available/total disk bytes for the filesystem holding the daemon's default project
  // directory; polled by the web every 60 s.
  rpc GetHostDiskStats(GetHostDiskStatsRequest) returns (GetHostDiskStatsResponse);
}

message ListToolsRequest {}
message ListToolsResponse {
  repeated ToolInfo tools = 1;
}
message ToolInfo {
  string path = 1;
  string label = 2;
}

message ListAgentsRequest {}
message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}
message AgentInfo {
  string id = 1;
  string label = 2;
}

message ListAgentModelsRequest {
  string session_token = 1;
  // Agent id ("claude", "cursor", "codex-acp", …) or the pseudo-agent "claude-cli".
  string agent = 2;
  // Optional daemon instance to run the probe on (multi-host). Empty = local.
  string daemon_instance_id = 3;
}
message ListAgentModelsResponse {
  repeated ModelInfo models = 1;
  // Id (within `models`) to preselect — the backend's current/default model.
  string default_model = 2;
}
message ModelInfo {
  // Value passed as --model (e.g. "gpt-5.2", "opus", "claude-opus-4-8").
  string id = 1;
  // Human-readable label (e.g. "GPT-5.2", "Claude Opus 4.8").
  string label = 2;
}

message ListSubagentsRequest {}
message ListSubagentsResponse {
  repeated SubagentInfo subagents = 1;
}
message SubagentInfo {
  string name = 1;
  string label = 2;
  string model = 3;
}

message ListSessionsRequest {
  string session_token = 1;
}
message ListSessionsResponse {
  repeated SessionEntry sessions = 1;
}
message SessionEntry {
  string session_id = 1;
  string created_at = 2;
  string status = 3;
  string repo_path = 4;
  uint32 pid = 5;
  bool is_active = 6;
  string project_id = 7;
  // Owning daemon instance for multi-host selection (local id for sessions on this daemon).
  string daemon_instance_id = 8;
  // Workflow / TUI parity (from .session.yaml + changeset.yaml enrichment).
  string workflow_goal = 9;
  string workflow_state = 10;
  // Human-readable elapsed for the active goal/step, or persisted timestamp display.
  string elapsed_display = 11;
  string agent = 12;
  string model = 13;
  // True when the session is blocked waiting for human input (elicitation).
  bool pending_elicitation = 14;
  // Granular activity status for claude-cli sessions (Started, Running, ExecutingTool,
  // WaitingForInput, Done, Ended). Empty string for tool/changeset sessions.
  string activity_status = 15;
  // Extra .session.yaml fields surfaced for the session inspector.
  string tool = 16;
  string session_type = 17;
  string updated_at = 18;
  string livekit_room = 19;
  string previous_session_id = 20;
  // Back-reference to the orchestrating PR-stack session that spawned this child session.
  // Empty string for non-child sessions.
  string orchestrator_session_id = 21;
  // Workflow recipe used when spawning this session (e.g. "tdd", "orchestrate-pr-stack",
  // "plan-pr-stack"). Empty string for claude-cli and workspace sessions.
  string recipe = 22;
  // JSON-serialized `Stack` (see tddy_core::changeset::Stack) for "pr-stack" orchestrator
  // sessions that have a plan. Empty string when this session is not a pr-stack orchestrator,
  // or the plan has not been written yet. Powers the PR-Stack Chat Screen's planned-PR list
  // (docs/ft/web/session-drawer.md § Per-Workflow Session Views).
  string stack_plan_json = 23;
  // Cumulative bytes received over the session's transport (LiveKit for tddy-coder sessions with
  // a participant; the gRPC terminal stream for claude-cli / cursor-cli / workspace sessions the
  // daemon owns). Populated by the daemon `ListSessions` for sessions it can observe; zero for
  // tddy-coder sessions with no LiveKit participant. Inspector fallback when no live runtime
  // exists (changeset 2026-07-12-fast-session-change).
  uint64 bytes_in = 24;
  // Cumulative bytes sent over the session's transport. See `bytes_in`.
  uint64 bytes_out = 25;
  // Epoch-milliseconds of the most recent data received over the session's transport, as a string.
  // Empty when no data has ever been received. Inspector fallback when no live runtime exists.
  string last_data_received_at = 26;
}

message ProjectEntry {
  string project_id = 1;
  string name = 2;
  string git_url = 3;
  string main_repo_path = 4;
  // Owning daemon for this registry row (multi-daemon aggregated ListProjects).
  string daemon_instance_id = 5;
}

message ListProjectsRequest {
  string session_token = 1;
  // When true, return only this daemon's local registry rows and skip peer fan-out. Set by the
  // peer-project aggregation path so a fanned-out ListProjects does not recurse back into peers.
  bool local_only = 2;
}
message ListProjectsResponse {
  repeated ProjectEntry projects = 1;
}

message CreateProjectRequest {
  string session_token = 1;
  string name = 2;
  string git_url = 3;
  // Optional path relative to the OS user's home (POSIX segments, e.g. "Code/my-app" or "~/Code/my-app").
  // When empty, the clone destination is ~/{repos_base_path}/{name}/ (default repos_base_path: "repos").
  string user_relative_path = 4;
}
message CreateProjectResponse {
  ProjectEntry project = 1;
}

message AddProjectToHostRequest {
  string session_token = 1;
  // Existing logical project id to reuse on the target host.
  string project_id = 2;
  string name = 3;
  string git_url = 4;
  // Optional integration base ref for the cloned checkout (empty = documented default).
  string main_branch_ref = 5;
  // Target daemon instance to add the project to. Empty or matching local instance = add locally.
  string daemon_instance_id = 6;
  // Optional clone destination relative to the OS user's home (same semantics as CreateProject).
  string user_relative_path = 7;
}
message AddProjectToHostResponse {
  // The registry row created (or already present) on the target host.
  ProjectEntry project = 1;
}

message StartSessionRequest {
  string session_token = 1;
  // Path to the binary to spawn for this session only (from daemon allowlist). Not stored on the project.
  string tool_path = 2;
  string project_id = 3;
  // Per new session: passed to spawned tddy-coder as --agent (skips interactive backend menu). Not stored on the project.
  string agent = 4;
  // Target daemon instance to run this session on. Empty or matching local instance = spawn locally.
  string daemon_instance_id = 5;
  // Workflow recipe for the new session ("tdd" or "bugfix"). Empty means default (tdd).
  string recipe = 6;
  // Session type: "tool" (default/empty) spawns tddy-coder; "claude-cli" spawns the Claude Code CLI in a PTY.
  string session_type = 7;
  // Model id for claude-cli sessions (e.g. "claude-opus-4-8"). Required when session_type = "claude-cli".
  string model = 8;
  // Branch/worktree intent for claude-cli sessions. One of: "new_branch_from_base",
  // "work_on_selected_branch". Empty defaults to "new_branch_from_base" with a generated name.
  string branch_worktree_intent = 9;
  // Required when branch_worktree_intent = "new_branch_from_base". Name for the new branch.
  string new_branch_name = 10;
  // Optional override for the integration base ref (e.g. "origin/master"). When empty, the project's
  // main_branch_ref (or the daemon default) is used.
  string selected_integration_base_ref = 11;
  // Required when branch_worktree_intent = "work_on_selected_branch". The existing branch to check out.
  string selected_branch_to_work_on = 12;
  // Optional first prompt to pass as a positional argument to the claude CLI process on launch
  // (e.g. `claude "build feature X"`). Only used when session_type = "claude-cli". Empty = no prompt.
  // The session is still started interactively; the prompt seeds the first user turn.
  string initial_prompt = 13;
  // Permission mode for claude-cli sessions. Empty string defaults to "auto".
  // Valid values: "auto", "default", "acceptEdits", "plan", "bypassPermissions".
  // Passed as `--permission-mode <mode>` to the claude binary.
  string permission_mode = 14;
  // Optional: session ID of the orchestrating PR-stack session. When set, the spawned tddy-coder
  // receives `--stack-parent <id>` so it can back-reference the orchestrator.
  string stack_parent = 15;
  // When true with session_type = "claude-cli", spawn claude inside a platform sandbox (darwin Seatbelt).
  bool sandbox = 16;
  // Managed-codebase mode (see docs/ft/coder/managed-codebase-subagents.md): the sandboxed jail does
  // not mount the repo — the agent reaches it only via mcp__tddy-tools__* exec tools. Only meaningful
  // when session_type = "claude-cli" (and typically sandbox = true).
  bool managed_codebase = 17;
  // Names of specialized subagents (see docs/ft/coder/specialized-subagents.md) to wire into this
  // session's mcp__tddy-tools__subagent_* tools. Each name must resolve to a builtin or
  // <tddyhome>/agents/*.yaml def; an unresolvable name is a request error.
  repeated string specialized_agents = 18;
  // Absolute path to a local git checkout to use as the session worktree, sent by a local client
  // (e.g. tddy-sandbox-app) instead of selecting a configured project_id. When set, it overrides
  // project_id-based resolution. The session still runs as the caller's mapped os_user, so this
  // grants no access beyond that user. Empty = resolve from project_id as before.
  string repo_path = 24;
  // Extra arguments forwarded verbatim to the in-jail `claude` for claude-cli sessions (after any
  // recipe/config args; a trailing positional prompt lands last). Sent by local clients that carry
  // their own SandboxAppConfig. Empty = none.
  repeated string claude_args = 25;
  // Removed: discovery_subagent (single-name alias), fastcontext_url/fastcontext_model/
  // fastcontext_max_turns/subagent_replaces. All specialized-agent configuration (name, model,
  // base_url, max_turns, replaces) now comes exclusively from `specialized_agents` resolved
  // against the caller's YAML defs (or the builtin `fastcontext` def) — no caller-facing override,
  // no single-name alias. No backwards compatibility retained.
  reserved 19, 20, 21, 22, 23;
}
message StartSessionResponse {
  string session_id = 1;
  string livekit_room = 2;
  string livekit_url = 3;
  string livekit_server_identity = 4;
}

message ConnectSessionRequest {
  string session_token = 1;
  string session_id = 2;
}
message ConnectSessionResponse {
  string livekit_room = 1;
  string livekit_url = 2;
  string livekit_server_identity = 3;
}

message ResumeSessionRequest {
  string session_token = 1;
  string session_id = 2;
}
message ResumeSessionResponse {
  string session_id = 1;
  string livekit_room = 2;
  string livekit_url = 3;
  string livekit_server_identity = 4;
}

enum Signal {
  SIGNAL_SIGINT = 0;
  SIGNAL_SIGTERM = 1;
  SIGNAL_SIGKILL = 2;
}

message SignalSessionRequest {
  string session_token = 1;
  string session_id    = 2;
  int32  signal        = 3;
  // Control token; required when the session has an active terminal controller.
  string control_token = 4;
}

message SignalSessionResponse {
  bool ok = 1;
  string message = 2;
}

message DeleteSessionRequest {
  string session_token = 1;
  string session_id = 2;
}

message DeleteSessionResponse {
  bool ok = 1;
}

message ListEligibleDaemonsRequest {
  string session_token = 1;
}
message EligibleDaemonEntry {
  string instance_id = 1;
  string label = 2;
  bool is_local = 3;
}
message ListEligibleDaemonsResponse {
  repeated EligibleDaemonEntry daemons = 1;
}

message ListSessionWorkflowFilesRequest {
  string session_token = 1;
  string session_id = 2;
}

message WorkflowFileEntry {
  string basename = 1;
}

message ListSessionWorkflowFilesResponse {
  repeated WorkflowFileEntry files = 1;
}

message ReadSessionWorkflowFileRequest {
  string session_token = 1;
  string session_id = 2;
  // Allowlisted workflow file basename (server resolves under session dir only).
  string basename = 3;
}

message ReadSessionWorkflowFileResponse {
  string content_utf8 = 1;
}

// --- Worktrees (local daemon; see docs/ft/web/worktrees.md) ---

message WorktreeRow {
  string path = 1;
  string branch_label = 2;
  uint64 disk_bytes = 3;
  uint32 changed_files = 4;
  int64 lines_added = 5;
  int64 lines_removed = 6;
  int64 updated_at_unix_ms = 7;
  bool stale = 8;
}

message ListWorktreesForProjectRequest {
  string session_token = 1;
  string project_id = 2;
  // When true, runs git/diff/stat refresh for this project before returning cached rows.
  bool refresh = 3;
}

message ListWorktreesForProjectResponse {
  repeated WorktreeRow worktrees = 1;
}

message RemoveWorktreeRequest {
  string session_token = 1;
  string project_id = 2;
  // Absolute or repo-relative path as accepted by server validation (must appear in git worktree list).
  string worktree_path = 3;
}

message RemoveWorktreeResponse {
  bool ok = 1;
  string message = 2;
}

// --- Project branch listing (for claude-cli branch selection dropdown) ---

message ListProjectBranchesRequest {
  string session_token = 1;
  string project_id = 2;
  string daemon_instance_id = 3;
}

message ListProjectBranchesResponse {
  repeated string branches = 1;
}

// --- Claude Code CLI terminal I/O streaming ---

message SessionTerminalInput {
  string session_token = 1;
  string session_id    = 2;
  bytes  data          = 3;
  // Target terminal; empty resolves to the reserved main ("claude") terminal.
  string terminal_id   = 4;
  // Control token from ClaimTerminalControl; must match the current holder token or the input is
  // rejected with FAILED_PRECONDITION (if the session has an active controller).
  string control_token = 5;
}

message SessionTerminalOutput {
  bytes data = 1;
}

// Used by StreamTerminalOutput (browser-compatible server-streaming variant).
message StreamTerminalOutputRequest {
  string session_token = 1;
  string session_id    = 2;
  // Target terminal; empty resolves to the reserved main ("claude") terminal.
  string terminal_id   = 3;
  // Terminal dimensions measured by the client before opening the stream.
  // When non-zero, the daemon resizes the PTY to these dimensions before
  // sending the replay buffer, so the TUI redraws at the correct width.
  uint32 initial_cols  = 4;
  uint32 initial_rows  = 5;
}

// Empty response for SendTerminalInput.
message SendTerminalInputResponse {}

// --- Multiple terminals per session ---

message StartTerminalSessionRequest {
  string session_token = 1;
  string session_id    = 2;
  // Control token; required when the session has an active terminal controller.
  string control_token = 3;
}

message StartTerminalSessionResponse {
  // Fresh identifier for the started login-shell terminal (never "main").
  string terminal_id = 1;
}

message StopTerminalSessionRequest {
  string session_token = 1;
  string session_id    = 2;
  string terminal_id   = 3;
  // Control token; required when the session has an active terminal controller.
  string control_token = 4;
}

message StopTerminalSessionResponse {
  bool   ok      = 1;
  string message = 2;
}

message ListTerminalSessionsRequest {
  string session_token = 1;
  string session_id    = 2;
}

message TerminalSessionInfo {
  string terminal_id = 1;
  // "claude-cli" for the reserved main tool, "bash" for started Bash (shell) tools.
  string kind        = 2;
  uint32 pid         = 3;
}

message ListTerminalSessionsResponse {
  repeated TerminalSessionInfo terminals = 1;
}

// --- Remote-codebase mode: tool execution in session worktrees ---

message ExecuteToolRequest {
  string session_token      = 1;
  string session_id         = 2;
  string tool_name          = 3;
  string args_json          = 4;
  string daemon_instance_id = 5;
}

message ExecuteToolResponse {
  string result_json    = 1;
  bool   is_error       = 2;
  string error_message  = 3;
  string job_id         = 4;
  bool   job_running    = 5;
}

message ListExecToolsRequest {
  string session_token      = 1;
  string daemon_instance_id = 2;
}

message ToolDef {
  string name              = 1;
  string description       = 2;
  string input_schema_json = 3;
}

message ListExecToolsResponse {
  repeated ToolDef tools = 1;
}

message ListSessionToolCallsRequest {
  string session_token      = 1;
  string session_id         = 2;
  string daemon_instance_id = 3;
}
message ToolCallInfo {
  string task_id          = 1;
  string tool_name        = 2;
  string args_json        = 3;
  string result_json      = 4;
  bool   is_error         = 5;
  string error_message    = 6;
  bool   job_running      = 7;
  uint64 created_unix_ms  = 8;
}
message ListSessionToolCallsResponse {
  repeated ToolCallInfo tool_calls = 1;
}

// --- Session activity status reporting from per-worktree hooks ---

/// Sent by `tddy-tools session-hook`; bearer is the per-session hook_token.
message ReportSessionStatusRequest {
  // Daemon session id (baked into the hook command at worktree-prep time).
  string session_id = 1;
  // Per-session random token — validated against .session.yaml hook_token field.
  string hook_token = 2;
  // OS user (resolves the sessions_base path on the daemon).
  string os_user = 3;
  // Wire status string: one of Started, Running, ExecutingTool, WaitingForInput, Done, Ended.
  string status = 4;
}

message ReportSessionStatusResponse {
  bool ok = 1;
}

// --- Demo VM lifecycle (UI-driven QEMU boot/shutdown for the demo goal) ---

message StartDemoVmRequest {
  string session_token = 1;
  string session_id    = 2;
}

// State of the demo VM for a session.
enum DemoVmState {
  DEMO_VM_STATE_UNKNOWN = 0;
  DEMO_VM_STATE_BOOTING = 1;
  DEMO_VM_STATE_RUNNING = 2;
  DEMO_VM_STATE_STOPPED = 3;
  DEMO_VM_STATE_ERROR   = 4;
}

message StartDemoVmResponse {
  DemoVmState state   = 1;
  string      message = 2;
}

message StopDemoVmRequest {
  string session_token = 1;
  string session_id    = 2;
}

message StopDemoVmResponse {
  bool   ok      = 1;
  string message = 2;
}

message GetDemoVmStatusRequest {
  string session_token = 1;
  string session_id    = 2;
}

message GetDemoVmStatusResponse {
  DemoVmState state         = 1;
  uint32      ssh_host_port = 2;
  string      message       = 3;
  // Present when state = RUNNING and an app port is configured (e.g. "http://localhost:8080").
  string      share_url     = 4;
}

// --- Single-screen terminal control mutex ---

message ClaimTerminalControlRequest {
  string session_token = 1;
  string session_id    = 2;
  // Stable per-browser-tab screen identity (see presenceIdentity.ts / screenId.ts).
  string screen_id     = 3;
  // When false, only grants if the lease is currently unheld or already held by this screen.
  // When true, always grants — evicts the previous holder and notifies via WatchTerminalControl.
  bool   steal         = 4;
}

message ClaimTerminalControlResponse {
  bool   granted                  = 1;
  // Set when granted = true; present this token in subsequent control RPCs.
  string control_token            = 2;
  // Set when granted = false; identifies the screen currently holding the lease.
  string current_holder_screen_id = 3;
}

message WatchTerminalControlRequest {
  string session_token = 1;
  string session_id    = 2;
  // The control token held by this screen (from ClaimTerminalControlResponse). Empty is valid for
  // a non-controlling observer that wants to watch for when the lease becomes available.
  string control_token = 3;
}

// Emitted once on subscribe (snapshot) and again whenever the lease changes.
message TerminalControlEvent {
  // Screen id of the current holder; empty when no screen holds the lease.
  string holder_screen_id   = 1;
  // True if the subscribing screen is the current controller (its token matches the lease).
  bool   you_are_controller = 2;
}

// --- PR-Stack Chat Screen: manually adding a planned PR ---

message AddPlannedPrRequest {
  string session_token = 1;
  // The "pr-stack" orchestrator session whose Changeset.stack the new node is appended to.
  string session_id = 2;
  string title = 3;
  string description = 4;
  // Optional; empty string = none.
  string branch_suggestion = 5;
  // Ancestor node ids (StackNode.parents) chosen from the orchestrator's existing planned PRs.
  // Empty = root node (branches off the stack base).
  repeated string parents = 6;
  // Optional workflow recipe for the eventual child session (e.g. "tdd"). Empty = default ("tdd").
  string child_recipe = 7;
}

message AddPlannedPrResponse {
  // Updated JSON-serialized `Stack`, same wire shape as `SessionEntry.stack_plan_json` (field 23)
  // — callers re-use the existing `parseStackPlan` parser rather than a second message schema.
  string stack_plan_json = 1;
}

// --- Local peer-trust token minting (Unix-domain socket only) ---

message MintLocalTokenRequest {}
message MintLocalTokenResponse {
  string session_token = 1;
}

// --- Host Stats Footer: host-level telemetry for the selected daemon ---

message GetHostCpuStatsRequest {
  string session_token = 1;
}
message GetHostCpuStatsResponse {
  // Utilization percentage (0..100) of each logical core, core 0 first.
  repeated float per_core_percent = 1;
}

message GetHostDiskStatsRequest {
  string session_token = 1;
}
message GetHostDiskStatsResponse {
  // Free bytes on the filesystem containing the daemon's default project directory.
  uint64 available_bytes = 1;
  // Total bytes of that filesystem.
  uint64 total_bytes = 2;
  // Absolute path whose filesystem these figures describe (for tooltip/debug).
  string project_dir = 3;
}
