syntax = "proto3";

package connection;

service ConnectionService {
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc ConnectSession(ConnectSessionRequest) returns (ConnectSessionResponse);
  rpc ResumeSession(ResumeSessionRequest) returns (ResumeSessionResponse);
  rpc SignalSession(SignalSessionRequest) returns (SignalSessionResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc ListEligibleDaemons(ListEligibleDaemonsRequest) returns (ListEligibleDaemonsResponse);
  rpc ListSessionWorkflowFiles(ListSessionWorkflowFilesRequest) returns (ListSessionWorkflowFilesResponse);
  rpc ReadSessionWorkflowFile(ReadSessionWorkflowFileRequest) returns (ReadSessionWorkflowFileResponse);
  rpc ListWorktreesForProject(ListWorktreesForProjectRequest) returns (ListWorktreesForProjectResponse);
  rpc RemoveWorktree(RemoveWorktreeRequest) returns (RemoveWorktreeResponse);
  rpc StreamSessionTerminalIO(stream SessionTerminalInput) returns (stream SessionTerminalOutput);
  // Browser-compatible alternative: server-streaming output + separate unary input.
  // (connect-web fetch transport cannot send streaming request bodies required for bidi streaming.)
  rpc StreamTerminalOutput(StreamTerminalOutputRequest) returns (stream SessionTerminalOutput);
  rpc SendTerminalInput(SessionTerminalInput) returns (SendTerminalInputResponse);
  rpc ListProjectBranches(ListProjectBranchesRequest) returns (ListProjectBranchesResponse);
}

message ListToolsRequest {}
message ListToolsResponse {
  repeated ToolInfo tools = 1;
}
message ToolInfo {
  string path = 1;
  string label = 2;
}

message ListAgentsRequest {}
message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}
message AgentInfo {
  string id = 1;
  string label = 2;
}

message ListSessionsRequest {
  string session_token = 1;
}
message ListSessionsResponse {
  repeated SessionEntry sessions = 1;
}
message SessionEntry {
  string session_id = 1;
  string created_at = 2;
  string status = 3;
  string repo_path = 4;
  uint32 pid = 5;
  bool is_active = 6;
  string project_id = 7;
  // Owning daemon instance for multi-host selection (local id for sessions on this daemon).
  string daemon_instance_id = 8;
  // Workflow / TUI parity (from .session.yaml + changeset.yaml enrichment).
  string workflow_goal = 9;
  string workflow_state = 10;
  // Human-readable elapsed for the active goal/step, or persisted timestamp display.
  string elapsed_display = 11;
  string agent = 12;
  string model = 13;
  // True when the session is blocked waiting for human input (elicitation).
  bool pending_elicitation = 14;
}

message ProjectEntry {
  string project_id = 1;
  string name = 2;
  string git_url = 3;
  string main_repo_path = 4;
  // Owning daemon for this registry row (multi-daemon aggregated ListProjects).
  string daemon_instance_id = 5;
}

message ListProjectsRequest {
  string session_token = 1;
}
message ListProjectsResponse {
  repeated ProjectEntry projects = 1;
}

message CreateProjectRequest {
  string session_token = 1;
  string name = 2;
  string git_url = 3;
  // Optional path relative to the OS user's home (POSIX segments, e.g. "Code/my-app" or "~/Code/my-app").
  // When empty, the clone destination is ~/{repos_base_path}/{name}/ (default repos_base_path: "repos").
  string user_relative_path = 4;
}
message CreateProjectResponse {
  ProjectEntry project = 1;
}

message StartSessionRequest {
  string session_token = 1;
  // Path to the binary to spawn for this session only (from daemon allowlist). Not stored on the project.
  string tool_path = 2;
  string project_id = 3;
  // Per new session: passed to spawned tddy-coder as --agent (skips interactive backend menu). Not stored on the project.
  string agent = 4;
  // Target daemon instance to run this session on. Empty or matching local instance = spawn locally.
  string daemon_instance_id = 5;
  // Workflow recipe for the new session ("tdd" or "bugfix"). Empty means default (tdd).
  string recipe = 6;
  // Session type: "tool" (default/empty) spawns tddy-coder; "claude-cli" spawns the Claude Code CLI in a PTY.
  string session_type = 7;
  // Model id for claude-cli sessions (e.g. "claude-opus-4-8"). Required when session_type = "claude-cli".
  string model = 8;
  // Branch/worktree intent for claude-cli sessions. One of: "new_branch_from_base",
  // "work_on_selected_branch". Empty defaults to "new_branch_from_base" with a generated name.
  string branch_worktree_intent = 9;
  // Required when branch_worktree_intent = "new_branch_from_base". Name for the new branch.
  string new_branch_name = 10;
  // Optional override for the integration base ref (e.g. "origin/master"). When empty, the project's
  // main_branch_ref (or the daemon default) is used.
  string selected_integration_base_ref = 11;
  // Required when branch_worktree_intent = "work_on_selected_branch". The existing branch to check out.
  string selected_branch_to_work_on = 12;
  // Optional first prompt to pass as a positional argument to the claude CLI process on launch
  // (e.g. `claude "build feature X"`). Only used when session_type = "claude-cli". Empty = no prompt.
  // The session is still started interactively; the prompt seeds the first user turn.
  string initial_prompt = 13;
  // Permission mode for claude-cli sessions. Empty string defaults to "auto".
  // Valid values: "auto", "default", "acceptEdits", "plan", "bypassPermissions".
  // Passed as `--permission-mode <mode>` to the claude binary.
  string permission_mode = 14;
}
message StartSessionResponse {
  string session_id = 1;
  string livekit_room = 2;
  string livekit_url = 3;
  string livekit_server_identity = 4;
}

message ConnectSessionRequest {
  string session_token = 1;
  string session_id = 2;
}
message ConnectSessionResponse {
  string livekit_room = 1;
  string livekit_url = 2;
  string livekit_server_identity = 3;
}

message ResumeSessionRequest {
  string session_token = 1;
  string session_id = 2;
}
message ResumeSessionResponse {
  string session_id = 1;
  string livekit_room = 2;
  string livekit_url = 3;
  string livekit_server_identity = 4;
}

enum Signal {
  SIGNAL_SIGINT = 0;
  SIGNAL_SIGTERM = 1;
  SIGNAL_SIGKILL = 2;
}

message SignalSessionRequest {
  string session_token = 1;
  string session_id = 2;
  int32 signal = 3;
}

message SignalSessionResponse {
  bool ok = 1;
  string message = 2;
}

message DeleteSessionRequest {
  string session_token = 1;
  string session_id = 2;
}

message DeleteSessionResponse {
  bool ok = 1;
}

message ListEligibleDaemonsRequest {
  string session_token = 1;
}
message EligibleDaemonEntry {
  string instance_id = 1;
  string label = 2;
  bool is_local = 3;
}
message ListEligibleDaemonsResponse {
  repeated EligibleDaemonEntry daemons = 1;
}

message ListSessionWorkflowFilesRequest {
  string session_token = 1;
  string session_id = 2;
}

message WorkflowFileEntry {
  string basename = 1;
}

message ListSessionWorkflowFilesResponse {
  repeated WorkflowFileEntry files = 1;
}

message ReadSessionWorkflowFileRequest {
  string session_token = 1;
  string session_id = 2;
  // Allowlisted workflow file basename (server resolves under session dir only).
  string basename = 3;
}

message ReadSessionWorkflowFileResponse {
  string content_utf8 = 1;
}

// --- Worktrees (local daemon; see docs/ft/web/worktrees.md) ---

message WorktreeRow {
  string path = 1;
  string branch_label = 2;
  uint64 disk_bytes = 3;
  uint32 changed_files = 4;
  int64 lines_added = 5;
  int64 lines_removed = 6;
  int64 updated_at_unix_ms = 7;
  bool stale = 8;
}

message ListWorktreesForProjectRequest {
  string session_token = 1;
  string project_id = 2;
  // When true, runs git/diff/stat refresh for this project before returning cached rows.
  bool refresh = 3;
}

message ListWorktreesForProjectResponse {
  repeated WorktreeRow worktrees = 1;
}

message RemoveWorktreeRequest {
  string session_token = 1;
  string project_id = 2;
  // Absolute or repo-relative path as accepted by server validation (must appear in git worktree list).
  string worktree_path = 3;
}

message RemoveWorktreeResponse {
  bool ok = 1;
  string message = 2;
}

// --- Project branch listing (for claude-cli branch selection dropdown) ---

message ListProjectBranchesRequest {
  string session_token = 1;
  string project_id = 2;
  string daemon_instance_id = 3;
}

message ListProjectBranchesResponse {
  repeated string branches = 1;
}

// --- Claude Code CLI terminal I/O streaming ---

message SessionTerminalInput {
  string session_token = 1;
  string session_id    = 2;
  bytes  data          = 3;
}

message SessionTerminalOutput {
  bytes data = 1;
}

// Used by StreamTerminalOutput (browser-compatible server-streaming variant).
message StreamTerminalOutputRequest {
  string session_token = 1;
  string session_id    = 2;
}

// Empty response for SendTerminalInput.
message SendTerminalInputResponse {}
