syntax = "proto3";

package connection;

service ConnectionService {
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc ConnectSession(ConnectSessionRequest) returns (ConnectSessionResponse);
  rpc ResumeSession(ResumeSessionRequest) returns (ResumeSessionResponse);
}

message ListToolsRequest {}
message ListToolsResponse {
  repeated ToolInfo tools = 1;
}
message ToolInfo {
  string path = 1;
  string label = 2;
}

message ListSessionsRequest {
  string session_token = 1;
}
message ListSessionsResponse {
  repeated SessionEntry sessions = 1;
}
message SessionEntry {
  string session_id = 1;
  string created_at = 2;
  string status = 3;
  string repo_path = 4;
  uint32 pid = 5;
  bool is_active = 6;
  string project_id = 7;
}

message ProjectEntry {
  string project_id = 1;
  string name = 2;
  string git_url = 3;
  string main_repo_path = 4;
}

message ListProjectsRequest {
  string session_token = 1;
}
message ListProjectsResponse {
  repeated ProjectEntry projects = 1;
}

message CreateProjectRequest {
  string session_token = 1;
  string name = 2;
  string git_url = 3;
  // Optional path relative to the OS user's home (POSIX segments, e.g. "Code/my-app" or "~/Code/my-app").
  // When empty, the clone destination is ~/{repos_base_path}/{name}/ (default repos_base_path: "repos").
  string user_relative_path = 4;
}
message CreateProjectResponse {
  ProjectEntry project = 1;
}

message StartSessionRequest {
  string session_token = 1;
  string tool_path = 2;
  string project_id = 3;
}
message StartSessionResponse {
  string session_id = 1;
  string livekit_room = 2;
  string livekit_url = 3;
  string livekit_server_identity = 4;
}

message ConnectSessionRequest {
  string session_token = 1;
  string session_id = 2;
}
message ConnectSessionResponse {
  string livekit_room = 1;
  string livekit_url = 2;
  string livekit_server_identity = 3;
}

message ResumeSessionRequest {
  string session_token = 1;
  string session_id = 2;
}
message ResumeSessionResponse {
  string session_id = 1;
  string livekit_room = 2;
  string livekit_url = 3;
  string livekit_server_identity = 4;
}
