syntax = "proto3";

package tddy.v1;

// TddyRemote: bidirectional streaming for programmatic control of tddy-coder.
// Daemon mode adds GetSession and ListSessions for session management.
service TddyRemote {
  rpc Stream(stream ClientMessage) returns (stream ServerMessage);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
}

// --- Client -> Server: UserIntent variants ---

message ClientMessage {
  oneof intent {
    SubmitFeatureInput submit_feature_input = 1;
    AnswerSelect answer_select = 2;
    AnswerOther answer_other = 3;
    AnswerMultiSelect answer_multi_select = 4;
    AnswerText answer_text = 5;
    QueuePrompt queue_prompt = 6;
    EditInboxItem edit_inbox_item = 7;
    DeleteInboxItem delete_inbox_item = 8;
    Scroll scroll = 10;
    Quit quit = 11;
    ApprovePlan approve_plan = 12;
    ViewPlan view_plan = 13;
    RefinePlan refine_plan = 14;
    DismissViewer dismiss_viewer = 15;
    StartSession start_session = 16;
    ConfirmWorktree confirm_worktree = 17;
  }
}

message StartSession {
  string prompt = 1;
  string repo_root = 2;  // Path to git repo root
}

message ConfirmWorktree {
  string branch = 1;
  string worktree_name = 2;
}

message ApprovePlan {}
message ViewPlan {}
message RefinePlan {}
message DismissViewer {}

message SubmitFeatureInput {
  string text = 1;
}

message AnswerSelect {
  uint32 index = 1;
}

message AnswerOther {
  string text = 1;
}

message AnswerMultiSelect {
  repeated uint32 indices = 1;
  string other = 2;
}

message AnswerText {
  string text = 1;
}

message QueuePrompt {
  string text = 1;
}

message EditInboxItem {
  uint32 index = 1;
  string text = 2;
}

message DeleteInboxItem {
  uint32 index = 1;
}

message Scroll {
  int32 delta = 1;
}

message Quit {}

// --- Server -> Client: PresenterView callback events ---

message ServerMessage {
  oneof event {
    ModeChanged mode_changed = 1;
    ActivityLogged activity_logged = 2;
    GoalStarted goal_started = 3;
    StateChanged state_changed = 4;
    WorkflowComplete workflow_complete = 5;
    AgentOutput agent_output = 6;
    InboxChanged inbox_changed = 7;
    IntentReceived intent_received = 8;
    SessionCreated session_created = 9;
    WorktreeElicitation worktree_elicitation = 10;
    SessionStatusChanged session_status_changed = 11;
    // TUI-equivalent runtime status for remote viewers (goal, state, elapsed, agent, model).
    SessionRuntimeStatus session_runtime_status = 12;
  }
}

// Per-session runtime snapshot aligned with the local TUI status bar (see format_status_bar).
message SessionRuntimeStatus {
  string session_id = 1;
  string goal = 2;
  string workflow_state = 3;
  uint64 elapsed_ms = 4;
  string agent = 5;
  string model = 6;
  // Optional verbatim line for byte-for-byte parity with format_status_bar.
  string status_line = 7;
}

message SessionCreated {
  string session_id = 1;
}

message WorktreeElicitation {
  string suggested_branch = 1;
  string suggested_worktree = 2;
}

message SessionStatusChanged {
  string session_id = 1;
  string status = 2;  // Pending, Active, WaitingForInput, Completed, Failed
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  SessionInfo session = 1;
}

message ListSessionsRequest {
  string repo_root = 1;  // Optional: filter by repo
}

message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
}

message SessionInfo {
  string session_id = 1;
  string status = 2;
  string plan_dir = 3;
  string worktree = 4;
  string branch = 5;
}

message ModeChanged {
  AppModeProto mode = 1;
}

message AppModeProto {
  oneof variant {
    AppModeFeatureInput feature_input = 1;
    AppModeRunning running = 2;
    AppModeSelect select = 3;
    AppModeMultiSelect multi_select = 4;
    AppModeTextInput text_input = 5;
    AppModeDone done = 7;
    AppModePlanReview plan_review = 8;
    AppModeMarkdownViewer markdown_viewer = 9;
  }
}

message AppModePlanReview {
  string prd_content = 1;
}
message AppModeMarkdownViewer {
  string content = 1;
}

message AppModeFeatureInput {}
message AppModeRunning {}
message AppModeSelect {
  ClarificationQuestionProto question = 1;
  uint32 question_index = 2;
  uint32 total_questions = 3;
  uint32 initial_selected = 4;
}
message AppModeMultiSelect {
  ClarificationQuestionProto question = 1;
  uint32 question_index = 2;
  uint32 total_questions = 3;
}
message AppModeTextInput {
  string prompt = 1;
}
message AppModeDone {}

message ClarificationQuestionProto {
  string header = 1;
  string question = 2;
  repeated QuestionOptionProto options = 3;
  bool multi_select = 4;
}

message QuestionOptionProto {
  string label = 1;
  string description = 2;
}

message ActivityLogged {
  string text = 1;
  string kind = 2;  // ToolUse, TaskStarted, TaskProgress, StateChange, Info, AgentOutput
}

message GoalStarted {
  string goal = 1;
}

message StateChanged {
  string from = 1;
  string to = 2;
}

message WorkflowComplete {
  bool ok = 1;
  string message = 2;  // summary on ok, error on !ok
}

message AgentOutput {
  string text = 1;
}

message InboxChanged {
  repeated string items = 1;
}

message IntentReceived {
  ClientMessage intent = 1;  // echo of the intent that was received
}
