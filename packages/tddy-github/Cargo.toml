[package]
name = "tddy-github"
version = "0.1.0"
edition = "2021"
description = "GitHub OAuth provider with stub for testing"

[lib]
name = "tddy_github"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
log = "0.4"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tddy-rpc = { path = "../tddy-rpc" }
tddy-service = { path = "../tddy-service" }
tokio = { version = "1", features = ["sync"] }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
prost = "0.13"
tokio = { version = "1", features = ["rt", "macros"] }
