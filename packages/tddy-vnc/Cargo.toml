[package]
name = "tddy-vnc"
version = "0.1.0"
edition = "2021"
description = "VNC-to-LiveKit bridge: framebuffer streaming + remote-control input forwarding for tddy sessions"

[lib]
name = "tddy_vnc"
path = "src/lib.rs"

[[bin]]
name = "tddy-vnc"
path = "src/main.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
env_logger = "0.11"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "net", "time", "io-util"] }

# VNC RFB client
vnc-rs = { git = "https://github.com/HsuJv/vnc-rs.git", branch = "main" }

# Workspace deps
tddy-screenshare = { path = "../tddy-screenshare" }

[dev-dependencies]
rstest = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = "3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "time"] }
qrcode = "0.14"
image = "0.25"
rqrr = "0.10"
tddy-screenshare = { path = "../tddy-screenshare" }
