[package]
name = "tddy-vnc"
version = "0.1.0"
edition = "2021"
description = "VNC-to-LiveKit bridge: framebuffer streaming + remote-control input forwarding for tddy sessions"

[lib]
name = "tddy_vnc"
path = "src/lib.rs"

[[bin]]
name = "tddy-vnc"
path = "src/main.rs"

[dependencies]
anyhow = "1"
env_logger = "0.11"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "net", "time", "io-util"] }
image = { version = "0.25", default-features = false, features = ["png"] }
prost = "0.13"

# LiveKit — video track publishing and data-channel RPC
livekit = "0.7"
livekit-api = "0.5"

# VNC RFB client
vnc-rs = { git = "https://github.com/HsuJv/vnc-rs.git", branch = "main" }

# Workspace deps
tddy-livekit = { path = "../tddy-livekit" }
tddy-service = { path = "../tddy-service" }
tddy-rpc = { path = "../tddy-rpc" }

[dev-dependencies]
rstest = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = "3"
