[package]
name = "tddy-tools"
version = "0.1.0"
edition = "2021"
description = "Generic tool calling handler for tddy-coder: CLI relay (submit, ask) + MCP server"

[lib]
name = "tddy_tools"
path = "src/lib.rs"

[build-dependencies]
serde_json = "1"
tddy-workflow-recipes = { path = "../tddy-workflow-recipes" }

[[bin]]
name = "tddy-tools"
path = "src/main.rs"

[dependencies]
tddy-core = { path = "../tddy-core" }
tddy-sandbox = { path = "../tddy-sandbox" }
tddy-build = { path = "../tddy-build" }
tddy-build-rust = { path = "../tddy-build-rust" }
tddy-build-typescript = { path = "../tddy-build-typescript" }
tddy-build-docker = { path = "../tddy-build-docker" }
tddy-build-buildroot = { path = "../tddy-build-buildroot" }
tddy-build-qemu = { path = "../tddy-build-qemu" }
tddy-workflow-recipes = { path = "../tddy-workflow-recipes" }
log = "0.4"
env_logger = "0.11"
clap = { version = "4", features = ["derive"] }
include_dir = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonschema = { version = "0.44", default-features = false }
anyhow = "1"
tempfile = "3"
rmcp = { version = "1", features = ["server", "transport-io", "schemars", "macros"] }
schemars = "1"
tokio = { version = "1", features = ["full"] }
portable-pty = "0.9"
bytes = "1"
# daemon-rpc: Connect-protocol RPC client used by session-hook (default-on).
tddy-service = { path = "../tddy-service" }
prost = { version = "0.13" }
# Relay dispatch: HTTP forwarding for dispatch_dynamic_tool.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
tonic = { version = "0.12", default-features = false, features = ["transport"] }
hyper = "1"
hyper-util = { version = "0.1", features = ["tokio"] }
http = "1"
tower = "0.5"
futures-util = "0.3"
tokio-stream = "0.1"
# LiveKit connect mode (tddy-tools pty-relay --livekit-url ...)
tddy-livekit = { path = "../tddy-livekit", optional = true }
livekit = { version = "0.7", optional = true }
livekit-api = { version = "0.5", optional = true }

[features]
livekit = ["dep:tddy-livekit", "dep:livekit", "dep:livekit-api"]

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
serde_json = "1"
serial_test = "3"
rstest = { workspace = true }
pretty_assertions = { workspace = true }
tddy-testing-commons = { path = "../tddy-testing-commons" }
tddy-demo-tui = { path = "../tddy-demo-tui" }
# Relay integration: `start_toolcall_listener` + CLI subprocess (`submit_relay_no_poll`).
tddy-core = { path = "../tddy-core" }
