[package]
name = "tddy-tools"
version = "0.1.0"
edition = "2021"
description = "Generic tool calling handler for tddy-coder: CLI relay (submit, ask) + MCP server"

[lib]
name = "tddy_tools"
path = "src/lib.rs"

[build-dependencies]
serde_json = "1"
tddy-workflow-recipes = { path = "../tddy-workflow-recipes" }

[[bin]]
name = "tddy-tools"
path = "src/main.rs"

[dependencies]
tddy-core = { path = "../tddy-core" }
tddy-workflow-recipes = { path = "../tddy-workflow-recipes" }
log = "0.4"
env_logger = "0.11"
clap = { version = "4", features = ["derive"] }
include_dir = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonschema = { version = "0.44", default-features = false }
anyhow = "1"
tempfile = "3"
rmcp = { version = "1", features = ["server", "transport-io", "schemars", "macros"] }
schemars = "1"
tokio = { version = "1", features = ["full"] }
portable-pty = "0.9"
bytes = "1"
# daemon-rpc: Connect-protocol RPC client used by session-hook (default-on).
tddy-service = { path = "../tddy-service" }
prost = { version = "0.13" }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
# LiveKit connect mode (tddy-tools pty-relay --livekit-url ...)
tddy-livekit = { path = "../tddy-livekit", optional = true }
livekit = { version = "0.7", optional = true }
livekit-api = { version = "0.4", optional = true }

[features]
livekit = ["dep:tddy-livekit", "dep:livekit", "dep:livekit-api"]

[target.'cfg(unix)'.dependencies]
tokio = { version = "1", features = ["net"] }
libc = "0.2"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
serde_json = "1"
serial_test = "3"
# Relay integration: `start_toolcall_listener` + CLI subprocess (`submit_relay_no_poll`).
tddy-core = { path = "../tddy-core" }
