[package]
name = "tddy-tools"
version = "0.1.0"
edition = "2021"
description = "Generic tool calling handler for tddy-coder: CLI relay (submit, ask) + MCP server"

[lib]
name = "tddy_tools"
path = "src/lib.rs"

[build-dependencies]
serde_json = "1"
tddy-workflow-recipes = { path = "../tddy-workflow-recipes" }

[[bin]]
name = "tddy-tools"
path = "src/main.rs"

[dependencies]
log = "0.4"
env_logger = "0.11"
clap = { version = "4", features = ["derive"] }
include_dir = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonschema = { version = "0.44", default-features = false }
anyhow = "1"
rmcp = { version = "1", features = ["server", "transport-io", "schemars", "macros"] }
schemars = "1"
tokio = { version = "1", features = ["full"] }

[target.'cfg(unix)'.dependencies]
tokio = { version = "1", features = ["net"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
serde_json = "1"
serial_test = "3"
tempfile = "3"
# Relay integration: `start_toolcall_listener` + CLI subprocess (`submit_relay_no_poll`).
tddy-core = { path = "../tddy-core" }
