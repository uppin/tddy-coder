[package]
name = "tddy-build"
version = "0.1.0"
edition = "2021"
description = "Bazel-inspired, content-addressed build engine + plugin wiring point (open BUILD.yaml config → BuildPlugin). Standalone — no tddy-* deps, no target-type knowledge."

[lib]
name = "tddy_build"
path = "src/lib.rs"

[dependencies]
prost = "0.13"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
thiserror = "2"
log = "0.4"
glob = "0.3"
tempfile = "3"
uuid = { version = "1", features = ["v7"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "process", "fs", "sync", "time", "io-util"] }
futures = "0.3"
tddy-actions = { path = "../tddy-actions" }
tddy-task = { path = "../tddy-task" }

[dev-dependencies]
rstest = { workspace = true }
pretty_assertions = { workspace = true }
tddy-testing-commons = { path = "../tddy-testing-commons" }

[build-dependencies]
prost-build = "0.13"
