[package]
name = "tddy-livekit-testkit"
version = "0.1.0"
edition = "2021"
description = "LiveKit testcontainer for integration tests"

[dependencies]
testcontainers = { version = "0.27", features = ["http_wait_plain"] }
livekit-api = "0.4"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "net"] }
anyhow = "1"
log = "0.4"
serial_test = "3"
