[package]
name = "tddy-permission"
version = "0.1.0"
edition = "2021"
description = "MCP server for Claude Code permission prompts in tddy-coder"

[[bin]]
name = "tddy-permission"
path = "src/main.rs"

[dependencies]
rmcp = { version = "1", features = ["server", "transport-io", "schemars", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
