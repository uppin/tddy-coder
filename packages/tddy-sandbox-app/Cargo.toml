[package]
name = "tddy-sandbox-app"
version = "0.1.0"
edition = "2021"
description = "Standalone terminal app: spawn darwin sandbox + Claude and proxy PTY via SessionChannel gRPC (no host daemon)"

[[bin]]
name = "tddy-sandbox-app"
path = "src/main.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
futures-util = "0.3"
bytes = "1"
uuid = { version = "1", features = ["v7"] }
tddy-core = { path = "../tddy-core" }
tddy-daemon = { path = "../tddy-daemon" }
tddy-discovery = { path = "../tddy-discovery" }
tddy-lsp = { path = "../tddy-lsp" }
tddy-lsp-executor = { path = "../tddy-lsp-executor" }
tddy-sandbox = { path = "../tddy-sandbox" }
tddy-sandbox-recipes = { path = "../tddy-sandbox-recipes" }
tddy-sandbox-runner = { path = "../tddy-sandbox-runner" }
tddy-service = { path = "../tddy-service" }
tddy-task = { path = "../tddy-task" }
tonic = { version = "0.12", default-features = false, features = ["transport"] }

# macOS spawns the Seatbelt jail in-process via this crate; the Linux path talks to a running
# tddy-daemon over gRPC instead and never links it.
[target.'cfg(target_os = "macos")'.dependencies]
tddy-sandbox-darwin = { path = "../tddy-sandbox-darwin" }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
serial_test = "3"
