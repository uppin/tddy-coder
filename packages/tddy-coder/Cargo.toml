[package]
name = "tddy-coder"
version = "0.1.0"
edition = "2021"
description = "TDD-driven coder CLI for PRD-based development workflow"

[lib]
name = "tddy_coder"
path = "src/lib.rs"

[[bin]]
name = "tddy-coder"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
log = "0.4"
anyhow = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs", "sync", "net"] }
uuid = { version = "1", features = ["v4"] }
ctrlc = { version = "3", features = ["termination"] }
crossterm = "0.28"
tddy-core = { path = "../tddy-core" }
tddy-tui = { path = "../tddy-tui" }
tddy-grpc = { path = "../tddy-grpc" }
tonic = "0.12"
tokio-stream = "0.1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
assert_cmd = "2"
