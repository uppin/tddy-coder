[package]
name = "tddy-coder"
version = "0.1.0"
edition = "2021"
description = "TDD-driven coder CLI for PRD-based development workflow"

[lib]
name = "tddy_coder"
path = "src/lib.rs"

[[bin]]
name = "tddy-coder"
path = "src/main.rs"

[dependencies]
axum = "0.8"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
clap = { version = "4", features = ["derive", "env"] }
log = "0.4"
tower-http = { version = "0.6", features = ["fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
anyhow = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs", "sync", "net"] }
uuid = { version = "1", features = ["v4", "v7"] }
ctrlc = { version = "3", features = ["termination"] }
crossterm = "0.29"
tddy-core = { path = "../tddy-core" }
tddy-acp = { path = "../tddy-acp" }
tddy-bsp = { path = "../tddy-bsp" }
tddy-build = { path = "../tddy-build" }
tddy-build-rust = { path = "../tddy-build-rust" }
tddy-build-typescript = { path = "../tddy-build-typescript" }
tddy-build-docker = { path = "../tddy-build-docker" }
tddy-build-buildroot = { path = "../tddy-build-buildroot" }
tddy-build-qemu = { path = "../tddy-build-qemu" }
tddy-tui = { path = "../tddy-tui" }
tddy-workflow-recipes = { path = "../tddy-workflow-recipes" }
tddy-discovery = { path = "../tddy-discovery" }
tddy-rpc = { path = "../tddy-rpc" }
tddy-stdio = { path = "../tddy-stdio" }
tddy-service = { path = "../tddy-service" }
tddy-livekit = { path = "../tddy-livekit" }
tddy-connectrpc = { path = "../tddy-connectrpc" }
tddy-github = { path = "../tddy-github" }
tddy-task = { path = "../tddy-task" }
tddy-pty = { path = "../tddy-pty" }
tddy-tool-engine = { path = "../tddy-tool-engine" }
tonic = "0.12"
tokio-stream = "0.1"
prost = "0.13"
async-trait = "0.1"
tempfile = "3"
walkdir = "2"
agent-client-protocol = { version = "=0.10.4", features = ["unstable"] }
tokio-util = { version = "0.7", features = ["compat"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
serial_test = "3"
assert_cmd = "2"
ctor = "0.2"
reqwest = { version = "0.12", default-features = false, features = ["blocking"] }
tempfile = "3"
rstest = { workspace = true }
pretty_assertions = { workspace = true }
tddy-testing-commons = { path = "../tddy-testing-commons" }
tddy-livekit-testkit = { path = "../tddy-livekit-testkit" }
livekit = "0.7"
futures-util = "0.3"
env_logger = "0.11"
