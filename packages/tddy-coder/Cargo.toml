[package]
name = "tddy-coder"
version = "0.1.0"
edition = "2021"
description = "TDD-driven coder CLI for PRD-based development workflow"

[lib]
name = "tddy_coder"
path = "src/lib.rs"

[[bin]]
name = "tddy-coder"
path = "src/main.rs"

[dependencies]
axum = "0.8"
clap = { version = "4", features = ["derive", "env"] }
log = "0.4"
tower-http = { version = "0.6", features = ["fs"] }
serde_json = "1"
anyhow = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs", "sync", "net"] }
uuid = { version = "1", features = ["v4", "v7"] }
ctrlc = { version = "3", features = ["termination"] }
crossterm = "0.29"
tddy-core = { path = "../tddy-core" }
tddy-tui = { path = "../tddy-tui" }
tddy-service = { path = "../tddy-service" }
tddy-livekit = { path = "../tddy-livekit" }
tddy-connectrpc = { path = "../tddy-connectrpc" }
tonic = "0.12"
tokio-stream = "0.1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
assert_cmd = "2"
ctor = "0.2"
reqwest = { version = "0.12", default-features = false, features = ["blocking"] }
