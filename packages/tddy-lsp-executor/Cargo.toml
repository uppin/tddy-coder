[package]
name = "tddy-lsp-executor"
version = "0.1.0"
edition = "2021"
description = "Concrete LspExecutor — binds tddy-build target discovery to the tddy-lsp registry; registered by the daemon and sandbox-app."

[lib]
name = "tddy_lsp_executor"
path = "src/lib.rs"

# Reuse tddy-lsp's deterministic fake server so the end-to-end test has a real binary to
# launch (exposes CARGO_BIN_EXE_fake_lsp to this crate's tests). It compiles against
# `tddy_lsp::protocol`, which is a dependency here.
[[bin]]
name = "fake_lsp"
path = "../tddy-lsp/tests/bin/fake_lsp.rs"

[dependencies]
tddy-core = { path = "../tddy-core" }
tddy-lsp = { path = "../tddy-lsp" }
tddy-build = { path = "../tddy-build" }
tddy-task = { path = "../tddy-task" }
log = "0.4"
serde_json = "1"
tokio = { version = "1", features = ["rt", "sync", "time"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time"] }
