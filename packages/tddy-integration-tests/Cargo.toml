[package]
name = "tddy-integration-tests"
version = "0.1.0"
edition = "2021"
publish = false
description = "Integration tests for tddy-core + tddy-workflow-recipes (avoids circular dev-deps)"

[dependencies]
ctor = "0.2"
async-trait = "0.1"
agent-client-protocol = "0.10.2"
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
livekit = "0.7"
log = "0.4"
serde_json = "1"
serde_yaml = "0.9"
serial_test = "3"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs", "process", "sync", "net", "io-util", "time"] }
tokio-util = { version = "0.7", features = ["compat"] }
uuid = { version = "1", features = ["v7"] }
tddy-core = { path = "../tddy-core" }
tddy-livekit = { path = "../tddy-livekit" }
tddy-livekit-testkit = { path = "../tddy-livekit-testkit" }
tddy-rpc = { path = "../tddy-rpc" }
tddy-service = { path = "../tddy-service" }
tddy-workflow = { path = "../tddy-workflow" }
tddy-workflow-recipes = { path = "../tddy-workflow-recipes" }
