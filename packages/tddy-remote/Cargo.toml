[package]
name = "tddy-remote"
version = "0.1.0"
edition = "2021"
publish = false
description = "SSH/SFTP-shaped remote client for tddy-daemon sandboxes (Connect + LiveKit)"

[lib]
name = "tddy_remote"
path = "src/lib.rs"

[[bin]]
name = "tddy-remote"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
env_logger = "0.11"
log = "0.4"
prost = "0.13"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
tokio = { version = "1", features = ["rt", "macros", "net", "io-util", "process", "fs"] }
uuid = { version = "1", features = ["v4"] }
tddy-connectrpc = { path = "../tddy-connectrpc" }
tddy-rpc = { path = "../tddy-rpc" }
tddy-service = { path = "../tddy-service" }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json"] }
scopeguard = "1"
tempfile = "3"
