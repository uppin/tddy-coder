[package]
name = "tddy-discovery"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
glob = "0.3"
log = "0.4"
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# agent_def.rs: <tddyhome>/agents/*.yaml specialized-subagent definitions.
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
tddy-core = { path = "../tddy-core" }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tddy-testing-commons = { path = "../tddy-testing-commons" }
wiremock = "0.6"
# subagent_session_red.rs / codebase_access_red.rs: local-filesystem CodebaseAccess fixtures.
tempfile = "3"
